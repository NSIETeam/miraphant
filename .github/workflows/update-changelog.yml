name: Update Changelog Data

on:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches: [main]
    paths:
      - 'scripts/fetch_commits.py'
      - '.github/workflows/update-changelog.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch all commits
        env:
          OTTO_PAT: ${{ secrets.OTTO_PAT }}
        run: |
          # GH_TOKEN is already set via env — gh CLI auto-detects it
          # For Otto (private repo), temporarily swap to OTTO_PAT if available
          if [ -n "$OTTO_PAT" ]; then
            export GH_TOKEN="$OTTO_PAT"
          fi
          python3 scripts/fetch_commits.py

      - name: Check for changes
        id: changes
        run: |
          if [ -f commits.json ]; then
            git diff --quiet commits.json || echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git pull --rebase origin main || true
          git stash pop || true
          git add commits.json
          git commit -m "auto: update changelog data [skip ci]"
          git push origin main
