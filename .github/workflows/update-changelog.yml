name: Update Changelog Data

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  push:
    branches: [main]
    paths:
      - 'scripts/fetch_commits.py'
      - '.github/workflows/update-changelog.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GitHub CLI
        run: |
          echo "$GH_TOKEN" | gh auth login --with-token
          gh auth status

      - name: Fetch all commits
        env:
          OTTO_PAT: ${{ secrets.OTTO_PAT }}
        run: |
          # If OTTO_PAT is set, use it for private repo access (Felix201209/otto)
          if [ -n "$OTTO_PAT" ]; then
            echo "Using OTTO_PAT for Otto private repo access"
            echo "$OTTO_PAT" | gh auth login --with-token
          fi
          python3 scripts/fetch_commits.py

      - name: Check for changes
        id: changes
        run: |
          if [ -f commits.json ]; then
            git diff --quiet commits.json || echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commits.json
          git commit -m "auto: update changelog data [skip ci]"
          git push
