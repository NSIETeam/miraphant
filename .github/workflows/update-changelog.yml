name: Update Changelog Data

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  push:
    branches: [main]
    paths:
      - 'scripts/fetch_commits.py'
      - '.github/workflows/update-changelog.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GitHub CLI
        run: |
          gh auth setup-git
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Fetch all commits
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OTTO_PAT: ${{ secrets.OTTO_PAT }}
        run: |
          # For Otto (private repo under Felix201209), use OTTO_PAT if available
          if [ -n "$OTTO_PAT" ]; then
            echo "Using OTTO_PAT for private repo access"
            echo "$OTTO_PAT" | gh auth login --with-token
          fi
          python3 scripts/fetch_commits.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet commits.json || echo "changed=true" >> $GITHUB_OUTPUT
          if [ ! -f commits.json ]; then echo "changed=true" >> $GITHUB_OUTPUT; fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commits.json
          git commit -m "auto: update changelog data [skip ci]"
          git push
