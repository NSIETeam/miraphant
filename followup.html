<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miraphant — Project Follow-up</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="js/portal.css">
<style>
:root{--w:#FFF;--b:#000;--g50:#F9F9F9;--g100:#F0F0F0;--g200:#E5E5E5;--g300:#CCC;--g400:#999;--g500:#666;--g600:#444;--g700:#333;--g800:#222;--ease:cubic-bezier(.16,1,.3,1);--sh-sm:0 1px 3px rgba(0,0,0,.04);--sh-md:0 4px 16px rgba(0,0,0,.06);--sh-lg:0 12px 40px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:'Inter',sans-serif;background:var(--w);color:var(--b);-webkit-font-smoothing:antialiased;overflow-x:hidden;animation:fi .4s var(--ease)}@keyframes fi{from{opacity:0}to{opacity:1}}
.mono{font-family:'JetBrains Mono',monospace}.container{max-width:1100px;margin:0 auto;padding:0 24px}
#hero{padding:100px 0 20px}.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:100px;border:1px solid var(--g200);background:var(--w);font-size:12px;font-weight:500;color:var(--g500);margin-bottom:16px;box-shadow:var(--sh-sm)}.hero-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--b);animation:pulse 2s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hero-title{font-size:clamp(28px,4.5vw,48px);font-weight:900;line-height:1.05;letter-spacing:-.035em;margin-bottom:12px}.hero-title .light{font-weight:300;color:var(--g400)}.hero-sub{font-size:15px;color:var(--g500);line-height:1.7;max-width:520px}
.section{padding:30px 0}.section.bb{border-bottom:1px solid var(--g100)}
.stats-row{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}.stat-box{padding:16px 20px;border:1px solid var(--g200);border-radius:14px;flex:1;min-width:120px;transition:all .3s var(--ease)}.stat-box:hover{border-color:var(--b)}.stat-box .num{font-size:24px;font-weight:800;letter-spacing:-1px}.stat-box .lbl{font-size:11px;color:var(--g400);margin-top:4px;letter-spacing:1px;text-transform:uppercase}
.repo-tabs{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap}.repo-tab{padding:8px 18px;border:1px solid var(--g200);border-radius:100px;background:var(--w);font-size:13px;font-weight:500;cursor:pointer;color:var(--g500);transition:all .2s;font-family:inherit;display:flex;align-items:center;gap:8px}.repo-tab:hover{border-color:var(--g400)}.repo-tab.active{background:var(--b);color:var(--w);border-color:var(--b)}
.repo-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}.rb-otto{background:#0ea5e9;color:#fff}.rb-circle{background:#E8F5E9;color:#2E7D32}.rb-olivewolf{background:#FFF3E0;color:#E65100}.rb-miraphant{background:#F3E5F5;color:#6A1B9A}.rb-easyhermes{background:#E3F2FD;color:#1565C0}
.tw{border:1px solid var(--g200);border-radius:16px;overflow:hidden;background:var(--w)}.ts{overflow-x:auto}table{width:100%;border-collapse:collapse}th{text-align:left;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--g400);padding:12px 16px;border-bottom:1px solid var(--g200);white-space:nowrap}td{padding:14px 16px;font-size:13px;border-bottom:1px solid var(--g50)}tr:last-child td{border-bottom:none}tbody tr{transition:background .15s}tbody tr:hover{background:var(--g50)}
.mono-ts{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--g400);white-space:nowrap}
.entry-row{background:var(--g50)}.entry-row td{border-bottom:1px solid var(--g200)}
.fi-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.fi-input{flex:1;min-width:180px;padding:10px 14px;border:1px solid var(--g200);border-radius:10px;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}.fi-input:focus{border-color:var(--b)}.fi-select{padding:10px 14px;border:1px solid var(--g200);border-radius:10px;font-size:13px;font-family:inherit;outline:none;background:var(--w);cursor:pointer}.fi-select:focus{border-color:var(--b)}
.btn-p{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:100px;background:var(--b);color:var(--w);font-weight:600;font-size:13px;border:none;cursor:pointer;font-family:inherit;transition:all .25s var(--ease)}.btn-p:hover{background:var(--g800)}.btn-sm{padding:6px 14px;font-size:12px}.btn-gh{background:none;border:none;color:var(--g500);font-size:12px;cursor:pointer;padding:5px 10px;font-family:inherit;transition:color .2s;border-radius:6px}.btn-gh:hover{color:var(--b);background:var(--g100)}
.bg{display:inline-block;padding:3px 10px;font-size:11px;font-weight:500;border-radius:100px}.bg-on{background:var(--b);color:var(--w)}.bg-hold{background:var(--g100);color:var(--g600)}.bg-done{background:#F0FFF0;color:#060;border:1px solid #CFC}.bg-risk{background:#FFF0F0;color:#C00;border:1px solid #FCC}.bg-plan{background:#F0F0FF;color:#33C;border:1px solid #CCF}
.toast{position:fixed;bottom:32px;right:32px;background:var(--b);color:var(--w);padding:12px 20px;border-radius:10px;font-size:13px;z-index:400;transform:translateY(100px);opacity:0;transition:all .3s var(--ease);box-shadow:var(--sh-lg)}.toast.show{transform:translateY(0);opacity:1}
.empty{text-align:center;padding:40px 20px;color:var(--g400);font-size:14px}
.reveal{opacity:0;transform:translateY(24px);transition:opacity .6s var(--ease),transform .6s var(--ease)}.reveal.visible{opacity:1;transform:translateY(0)}
.status-cell{cursor:pointer}.status-cell:hover{opacity:.7}
.project-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.project-title{font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px}
@media(max-width:768px){.fi-row{flex-direction:column}.fi-input{width:100%}}
</style>
</head>
<body>

</div></nav>
<section id="hero"><div class="container">
<div class="reveal"><div class="hero-badge"><span class="hero-badge-dot"></span>Project Follow-up</div></div>
<div class="reveal"><h1 class="hero-title"><span>Track progress,</span><br><span class="light">by project.</span></h1></div>
<div class="reveal"><p class="hero-sub">Each project is a living document. Add entries with auto-timestamps to track what happened and what's next.</p></div>
</div></section>
<section class="section bb" style="padding-top:20px"><div class="container"><div class="stats-row" id="fuStats"></div></div></section>
<section class="section" style="padding-top:20px;padding-bottom:60px"><div class="container">
<div class="reveal" style="margin-bottom:20px">
<div style="font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--g400);margin-bottom:12px">Projects</div>
<h2 style="font-size:clamp(20px,2.5vw,30px);font-weight:800;letter-spacing:-.03em;margin-bottom:16px">Status by repository</h2>
</div>
<div class="repo-tabs" id="repoTabs"></div>
<div id="projectArea"></div>
</div></section>
<div style="padding:32px 0;text-align:center;color:var(--g400);font-size:12px;border-top:1px solid var(--g100)"><div class="container">&copy; 2026 Miraphant, Inc.</div></div>
<script src="js/fu-app.js"></script>
</body>
</html>
