<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <clipPath id="bgClip">
      <rect width="200" height="200" rx="40"/>
    </clipPath>
  </defs>

  <!-- Black background -->
  <g clip-path="url(#bgClip)">
    <rect width="200" height="200" fill="#000000"/>

    <!-- Ring 1 (left) — gap at bottom intersection where Ring 2 goes over -->
    <circle cx="78" cy="100" r="48" stroke="#FFFFFF" stroke-width="6" fill="none"
            stroke-dasharray="39.96 25.13 236.50" stroke-dashoffset="0"/>

    <!-- Ring 2 (right) — gap at top intersection where Ring 1 goes over -->
    <circle cx="122" cy="100" r="48" stroke="#FFFFFF" stroke-width="6" fill="none"
            stroke-dasharray="190.83 25.13 85.63" stroke-dashoffset="0"/>

    <!-- Inner concentric ring -->
    <circle cx="100" cy="100" r="30" stroke="#FFFFFF" stroke-width="6" fill="none"/>

    <!-- Cross line 1 (top-left to bottom-right) -->
    <line x1="78.8" y1="78.8" x2="121.2" y2="121.2" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>

    <!-- Cross line 2 (top-right to bottom-left) -->
    <line x1="121.2" y1="78.8" x2="78.8" y2="121.2" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>

    <!-- Center dot -->
    <circle cx="100" cy="100" r="5" fill="#FFFFFF"/>
  </g>
</svg>
