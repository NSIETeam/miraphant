<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miraphant Employee Portal</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="js/portal.css">
<style>
:root{--w:#FFF;--b:#000;--g50:#F9F9F9;--g100:#F0F0F0;--g200:#E5E5E5;--g300:#CCC;--g400:#999;--g500:#666;--g600:#444;--g700:#333;--g800:#222;--ease:cubic-bezier(.16,1,.3,1);--sh-sm:0 1px 3px rgba(0,0,0,.04);--sh-md:0 4px 16px rgba(0,0,0,.06);--sh-lg:0 12px 40px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:'Inter',sans-serif;background:var(--w);color:var(--b);-webkit-font-smoothing:antialiased;overflow-x:hidden;animation:fi .4s var(--ease)}@keyframes fi{from{opacity:0}to{opacity:1}}
.mono{font-family:'JetBrains Mono',monospace}.container{max-width:1100px;margin:0 auto;padding:0 24px}
.portal-hero{padding:100px 0 30px}.portal-hero-content{max-width:800px;margin:0 auto;text-align:center}
.portal-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:100px;border:1px solid var(--g200);background:var(--w);font-size:12px;font-weight:500;color:var(--g500);margin-bottom:20px;box-shadow:var(--sh-sm)}.portal-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--b);animation:pulse 2s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.portal-hero-title{font-size:clamp(28px,4.5vw,46px);font-weight:900;line-height:1.05;letter-spacing:-.035em;margin-bottom:14px}.portal-hero-title .light{font-weight:300;color:var(--g400)}
.portal-hero-sub{font-size:15px;color:var(--g500);line-height:1.7;max-width:520px;margin:0 auto}
.dash-section{padding:40px 0;border-top:1px solid var(--g100)}.ds-label{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--g400);margin-bottom:16px}
.ds-title{font-size:clamp(20px,2.5vw,30px);font-weight:800;letter-spacing:-.03em;margin-bottom:20px}
/* Stats */
.stats-row{display:flex;gap:16px;flex-wrap:wrap}.stat-box{padding:24px;border:1px solid var(--g200);border-radius:16px;flex:1;min-width:160px;transition:all .3s var(--ease)}.stat-box:hover{border-color:var(--b);transform:translateY(-2px);box-shadow:var(--sh-sm)}.stat-box .num{font-size:32px;font-weight:800;letter-spacing:-1px}.stat-box .lbl{font-size:11px;color:var(--g400);margin-top:6px;letter-spacing:1px;text-transform:uppercase}.stat-box .sub{font-size:12px;color:var(--g400);margin-top:8px}
/* Two column layout */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
/* Cards */
.dash-card{border:1px solid var(--g200);border-radius:16px;padding:24px;transition:border-color .3s}.dash-card:hover{border-color:var(--g400)}
.dash-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.dash-card-head h3{font-size:14px;font-weight:600}
.dash-card-link{font-size:12px;color:var(--g400);text-decoration:none;transition:color .2s}.dash-card-link:hover{color:var(--b)}
/* Todo items */
.todo-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--g100);transition:padding-left .2s}.todo-item:last-child{border-bottom:none}.todo-item:hover{padding-left:4px}
.todo-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.todo-dot.red{background:#ff4444}.todo-dot.yellow{background:#e5a100}.todo-dot.green{background:#2e9e2e}.todo-dot.gray{background:var(--g300)}
.todo-text{font-size:13px;flex:1;min-width:0}.todo-text .title{color:var(--g700);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.todo-text .meta{color:var(--g400);font-size:11px;margin-top:2px}
.todo-action{font-size:11px;color:var(--g500);padding:4px 10px;border:1px solid var(--g200);border-radius:100px;text-decoration:none;transition:all .2s;white-space:nowrap}.todo-action:hover{color:var(--b);border-color:var(--b)}
/* Project status */
.proj-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--g100)}.proj-item:last-child{border-bottom:none}
.proj-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap;flex-shrink:0}.pb-otto{background:#0ea5e9;color:#fff}.pb-circle{background:#E8F5E9;color:#2E7D32}.pb-olivewolf{background:#FFF3E0;color:#E65100}.pb-miraphant{background:#F3E5F5;color:#6A1B9A}.pb-easyhermes{background:#E3F2FD;color:#1565C0}
.proj-text{flex:1;min-width:0}.proj-text .title{font-size:13px;font-weight:500;color:var(--g700);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.proj-text .meta{font-size:11px;color:var(--g400);margin-top:2px}
.proj-status{font-size:11px;padding:3px 10px;border-radius:100px;white-space:nowrap;flex-shrink:0}.ps-on{background:var(--b);color:var(--w)}.ps-done{background:#F0FFF0;color:#060;border:1px solid #CFC}.ps-hold{background:var(--g100);color:var(--g600)}.ps-plan{background:#F0F0FF;color:#33C;border:1px solid #CCF}.ps-risk{background:#FFF0F0;color:#C00;border:1px solid #FCC}
/* Quick actions */
.qa-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.qa-btn{padding:16px;border:1px solid var(--g200);border-radius:12px;text-decoration:none;color:inherit;transition:all .3s;text-align:center;cursor:pointer}.qa-btn:hover{border-color:var(--b);transform:translateY(-2px);box-shadow:var(--sh-sm)}.qa-btn svg{width:22px;height:22px;stroke:var(--g500);fill:none;stroke-width:1.5;margin:0 auto 8px;display:block}.qa-btn:hover svg{stroke:var(--b)}.qa-btn span{font-size:12px;color:var(--g500);transition:color .3s}.qa-btn:hover span{color:var(--b)}
.reveal{opacity:0;transform:translateY(24px);transition:opacity .6s var(--ease),transform .6s var(--ease)}.reveal.visible{opacity:1;transform:translateY(0)}
.empty{text-align:center;padding:32px;color:var(--g400);font-size:13px}
@media(max-width:768px){.dash-grid{grid-template-columns:1fr}.qa-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<script src="js/auth.js"></script>
<script>if(!window.checkAuth())window.location.href="index.html#employee-portal";</script>
<nav class="portal-nav" id="nav"><div class="portal-nav-inner">
<a href="index.html" class="portal-nav-logo"><img src="logo.png" style="width:32px;height:32px" alt="Miraphant"> Miraphant</a>
<ul class="portal-nav-links" id="navLinks">
<li><a href="portal.html" class="active">Dashboard</a></li>
<li><a href="oa.html">OA</a></li>
<li><a href="followup.html">Follow-up</a></li>
<li><a href="changelog.html">Log</a></li>
</ul>
<div class="portal-nav-right"><button class="portal-logout-btn" onclick="doLogout()">Logout</button></div>
<button class="portal-nav-toggle" id="navToggle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
</div></nav>

<section class="portal-hero"><div class="container" style="width:100%"><div class="portal-hero-content">
<div class="reveal"><div class="portal-badge"><span class="portal-badge-dot"></span>Employee Portal</div></div>
<div class="reveal"><h1 class="portal-hero-title"><span>Internal tools,</span><br><span class="light">all in one place.</span></h1></div>
<div class="reveal"><p class="portal-hero-sub" id="welcomeText">Welcome back. Here is your workspace overview.</p></div>
</div></div></section>

<!-- Stats -->
<section class="dash-section" style="border-top:none;padding-top:0"><div class="container">
<div class="ds-label">Overview</div>
<div class="stats-row" id="dashStats"></div>
</div></section>

<!-- Quick Actions -->
<section class="dash-section"><div class="container">
<div class="ds-label">Quick Actions</div>
<div class="qa-grid" id="qaGrid"></div>
</div></section>

<!-- Two Column: Todos + Project Status -->
<section class="dash-section"><div class="container">
<div class="dash-grid">
<div class="dash-card reveal">
<div class="dash-card-head"><h3>My Pending Items</h3><a href="oa.html" class="dash-card-link">View OA</a></div>
<div id="todoList"></div>
</div>
<div class="dash-card reveal">
<div class="dash-card-head"><h3>Project Status</h3><a href="followup.html" class="dash-card-link">View All</a></div>
<div id="projList"></div>
</div>
</div>
</div></section>

<div style="padding:32px 0;text-align:center;color:rgba(255,255,255,.15);font-size:12px;border-top:1px solid rgba(255,255,255,.05)"><div class="container">&copy; 2026 Miraphant, Inc. / Employee Portal</div></div>

<script>
var DB={get:function(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}},set:function(k,v){localStorage.setItem(k,JSON.stringify(v))}};
var cu={name:'Chen Xue',dept:'Design',role:'Design Director',id:'MF-004'};

function seedOA(){
if(!DB.get('oa-reimburse'))DB.set('oa-reimburse',[{id:'R001',applicant:'Chen Xue',dept:'Design',type:'transport',amount:120,invoiceNo:'INV-2026-004',reason:'Commute taxi',date:'2026-07-02',status:'pending'},{id:'R002',applicant:'Chen Xue',dept:'Design',type:'office',amount:380,invoiceNo:'INV-2026-005',reason:'Design software license',date:'2026-07-04',status:'pending'}]);
if(!DB.get('oa-leave'))DB.set('oa-leave',[{id:'L001',applicant:'Chen Xue',dept:'Design',type:'annual',startDate:'2026-07-15',endDate:'2026-07-16',days:2,reason:'Family trip',status:'pending'}]);
if(!DB.get('oa-travel'))DB.set('oa-travel',[{id:'T001',applicant:'Chen Xue',dept:'Design',destination:'Shanghai',purpose:'Design summit',transport:'train',startDate:'2026-07-20',endDate:'2026-07-22',budget:3000,status:'approved'}]);
if(!DB.get('oa-badge'))DB.set('oa-badge',[{id:'B001',name:'Chen Xue',role:'Design Director',dept:'Design',employeeId:'MF-004',phone:'138****1234',validUntil:'2027-12-31',style:'dark',status:'done'}]);
}
/* Follow-up data is owned by fu-app.js (followup.html). Read the SAME localStorage
   keys it writes to: 'fu-entries-{repoId}' holding [{ts,author,status,content,next}, ...].
   Do NOT seed a separate/duplicate dataset here — that caused the Dashboard to show
   stale data disconnected from the real Follow-up page. */
var FU_REPOS=[
{id:'otto',name:'Otto'},
{id:'circle',name:'Circle'},
{id:'OliveWolf',name:'OliveWolf'},
{id:'miraphant',name:'Miraphant'},
{id:'EasyHermes',name:'EasyHermes'}
];
function fuKey(repoId){return 'fu-entries-'+repoId}
/* Same seed content as js/fu-app.js — keep in sync if that seed data changes. */
function seedFollowupIfEmpty(){
var seeds={
otto:[
{ts:'2026-07-06 06:52',author:'krx521920',status:'done',content:'Mem0 structured memory + LangGraph task orchestration + OR-Tools optimization deployed. Multi-agent collaboration active.',next:'Monitor memory retrieval accuracy in production'},
{ts:'2026-07-06 06:28',author:'NSIETeam',status:'on',content:'Feishu project collaboration actions extended. Planner framework added.',next:'Ship collaboration planner v2 with task assignment'},
{ts:'2026-07-06 01:00',author:'NSIETeam',status:'on',content:'Codebase memory MCP adapter + CLI project memory commands wired to org memory MVP.',next:'Connect MCP tools to project memory manager'}
],
circle:[
{ts:'2026-07-03 14:00',author:'NSIETeam',status:'on',content:'AI-driven property matching algorithm v2 deployed. B2B platform ready for pilot.',next:'Onboard first 3 enterprise clients for beta'}
],
OliveWolf:[
{ts:'2026-07-04 11:00',author:'Felix201209',status:'plan',content:'Dual render backends working. Real-time audio-driven conversation functional.',next:'Benchmark latency on enterprise GPU (RTX 4090)'}
],
miraphant:[
{ts:'2026-07-07 12:10',author:'NSIETeam',status:'on',content:'Employee portal with OA system, follow-up tracker, and contribution log. Password auth implemented.',next:'Deploy to GitHub Pages + test auth flow on mobile'}
],
EasyHermes:[
{ts:'2026-07-02 09:00',author:'krx521920',status:'hold',content:'Core pipeline optimization paused pending Otto memory module.',next:'Resume after Otto v1.4 release'}
]
};
FU_REPOS.forEach(function(r){
if(!DB.get(fuKey(r.id))&&seeds[r.id])DB.set(fuKey(r.id),seeds[r.id]);
});
}
function getFollowupLatestPerRepo(){
var out=[];
FU_REPOS.forEach(function(r){
var entries=DB.get(fuKey(r.id),[]);
if(entries.length>0){
var e=entries[0];
out.push({repo:r.id,repoName:r.name,title:e.content,status:e.status,next:e.next,ts:e.ts,author:e.author});
}
});
return out;
}

function renderStats(){
var r=DB.get('oa-reimburse',[]).filter(function(x){return x.applicant===cu.name});
var l=DB.get('oa-leave',[]).filter(function(x){return x.applicant===cu.name});
var tr=DB.get('oa-travel',[]).filter(function(x){return x.applicant===cu.name});
var fu=getFollowupLatestPerRepo();
var pending=r.filter(function(x){return x.status==='pending'}).length+l.filter(function(x){return x.status==='pending'}).length+tr.filter(function(x){return x.status==='pending'}).length;
var activeProj=fu.filter(function(x){return x.status==='on'}).length;
var doneProj=fu.filter(function(x){return x.status==='done'}).length;
var stats=[
{num:pending,lbl:'My Pending',sub:'OA applications'},
{num:activeProj,lbl:'Active Projects',sub:'In progress now'},
{num:fu.length,lbl:'Tracked Repos',sub:'With updates'},
{num:r.length+l.length+tr.length,lbl:'My Total Apps',sub:'All time'}
];
document.getElementById('dashStats').innerHTML=stats.map(function(s){return'<div class="stat-box"><div class="num">'+s.num+'</div><div class="lbl">'+s.lbl+'</div><div class="sub">'+s.sub+'</div></div>'}).join('');
}

function renderQA(){
var actions=[
{href:'oa.html',icon:'M9 12l2 2 4-4M21 12c0 4.97-4.03 9-9 9s-9-4.03-9-9 4.03-9 9-9 9 4.03 9 9z',label:'New Reimbursement'},
{href:'oa.html',icon:'M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z',label:'New Leave'},
{href:'oa.html',icon:'M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0zM15 11a3 3 0 11-6 0 3 3 0 016 0z',label:'New Travel'},
{href:'followup.html',icon:'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2',label:'Update Status'}
];
document.getElementById('qaGrid').innerHTML=actions.map(function(a){return'<a href="'+a.href+'" class="qa-btn"><svg viewBox="0 0 24 24"><path d="'+a.icon+'"/></svg><span>'+a.label+'</span></a>'}).join('');
}

function renderTodos(){
var r=DB.get('oa-reimburse',[]).filter(function(x){return x.applicant===cu.name&&x.status==='pending'});
var l=DB.get('oa-leave',[]).filter(function(x){return x.applicant===cu.name&&x.status==='pending'});
var tr=DB.get('oa-travel',[]).filter(function(x){return x.applicant===cu.name&&x.status==='pending'});
var items=[];
r.forEach(function(x){items.push({dot:'yellow',title:x.reason,meta:'Reimbursement / '+x.date,action:'oa.html',actionLabel:'Review'})});
l.forEach(function(x){items.push({dot:'yellow',title:x.reason,meta:'Leave / '+x.startDate+' - '+x.endDate,action:'oa.html',actionLabel:'Review'})});
tr.forEach(function(x){items.push({dot:'yellow',title:x.destination+': '+x.purpose,meta:'Travel / '+x.startDate,action:'oa.html',actionLabel:'Review'})});
var el=document.getElementById('todoList');
if(items.length===0){el.innerHTML='<div class="empty">No pending items. You are all caught up.</div>';return}
el.innerHTML=items.map(function(i){return'<div class="todo-item"><div class="todo-dot '+i.dot+'"></div><div class="todo-text"><div class="title">'+i.title+'</div><div class="meta">'+i.meta+'</div></div><a href="'+i.action+'" class="todo-action">'+i.actionLabel+'</a></div>'}).join('');
}

function renderProjects(){
var fu=getFollowupLatestPerRepo();
var statusMap={on:{cls:'ps-on',label:'Active'},done:{cls:'ps-done',label:'Done'},hold:{cls:'ps-hold',label:'On Hold'},plan:{cls:'ps-plan',label:'Planned'},risk:{cls:'ps-risk',label:'At Risk'}};
var el=document.getElementById('projList');
if(fu.length===0){el.innerHTML='<div class="empty">No project updates yet. <a href="followup.html" style="color:#fff">Add one</a>.</div>';return}
el.innerHTML=fu.map(function(p){var s=statusMap[p.status]||statusMap.plan;return'<div class="proj-item"><span class="proj-badge pb-'+p.repo.toLowerCase()+'">'+p.repoName+'</span><div class="proj-text"><div class="title">'+p.title+'</div><div class="meta">'+(p.next||'\u2014')+'</div></div><span class="proj-status '+s.cls+'">'+s.label+'</span></div>'}).join('');
}


function renderAll(){renderStats();renderQA();renderTodos();renderProjects()}
var nav=document.getElementById('nav');window.addEventListener('scroll',function(){nav.classList.toggle('scrolled',window.scrollY>40)},{passive:true});
document.getElementById('navToggle').addEventListener('click',function(){document.getElementById('navLinks').classList.toggle('open')});
var obs=new IntersectionObserver(function(e){e.forEach(function(x){if(x.isIntersecting)x.target.classList.add('visible')})},{threshold:.1});document.querySelectorAll('.reveal').forEach(function(el){obs.observe(el)});
document.querySelectorAll('a[href$=".html"]').forEach(function(a){a.addEventListener('click',function(e){var h=a.getAttribute('href');if(h&&!h.startsWith('http')){e.preventDefault();document.body.style.opacity='0';document.body.style.transition='opacity .15s';setTimeout(function(){window.location.href=h},150)}})});
seedOA();seedFollowupIfEmpty();renderAll();
</script>
</body>
</html>
